---
archived/petition_mailer:
  email_creator:
    subject: "{{ email.subject }}"
    content: |
      Dear {{ signature.name }},

      You created the petition:

      > # {{ petition.action }}
      >
      > {{ petition.background }}
      >
      > <{{ petition.url }}>

      {{ email.body }}

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  email_signer:
    subject: "{{ email.subject }}"
    content: |-
      Dear {{ signature.name }},

      You signed the petition:

      > # {{ petition.action }}
      >
      > {{ petition.background }}
      >
      > <{{ petition.url }}>

      {{ email.body }}

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  mailshot_for_creator:
    subject: "{{ mailshot.subject }}"
    content: |
      Dear {{ signature.name }},

      You created the petition:

      > # {{ petition.action }}
      >
      > {{ petition.background }}
      >
      > <{{ petition.url }}>

      {{ email.body }}

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  mailshot_for_signer:
    subject: "{{ mailshot.subject }}"
    content: |
      Dear {{ signature.name }},

      You signed the petition:

      > # {{ petition.action }}
      >
      > {{ petition.background }}
      >
      > <{{ petition.url }}>

      {{ email.body }}

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  notify_creator_of_debate_scheduled:
    subject: Parliament will debate “{{ petition.action }}”
    content: |
      {% render "reason", petition: petition, signature: signature %}

      Dear {{ signature.name }},

      Parliament is going to debate your petition – “[{{ petition.action }}]({{ petition.url }})”.

      The debate is scheduled for {{ petition.scheduled_debate_date | date: "%d/%m/%Y" }}.

      Once the debate has happened, we’ll email you a video and transcript.

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  notify_creator_of_negative_debate_outcome:
    subject: Parliament didn’t debate “{{ petition.action }}”
    content: |
      {% render "reason", petition: petition, signature: signature %}

      Dear {{ signature.name }},

      <p>The Petitions Committee decided not to debate your petition – “<%= @petition.action %>”</p>

      <% if @debate_outcome.overview? %>
      <blockquote><%= auto_link(simple_format(h(@debate_outcome.overview))) %></blockquote>

      <% end %>
      <p>The petition: <%= link_to nil, archived_petition_url(@petition) %></p>

      <p>Find out more about the Petitions Committee: <%= link_to nil, help_url(anchor: "petitions-committee") %></p>

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  notify_creator_of_positive_debate_outcome:
    subject: Parliament debated “{{ petition.action }}”
    content: |
      {% render "reason", petition: petition, signature: signature %}

      Dear {{ signature.name }},

      <p>Parliament debated your petition – “<%= @petition.action %>”</p>

      <% if @debate_outcome.overview? %>
      <blockquote><%= auto_link(simple_format(h(@debate_outcome.overview))) %></blockquote>

      <% end %>
      <% if @debate_outcome.video_url? %>
      <p>Watch the debate: <%= auto_link(@debate_outcome.video_url) %></p>

      <% end %>
      <% if @debate_outcome.transcript_url? %>
      <p>Read the transcript: <%= auto_link(@debate_outcome.transcript_url) %></p>

      <% end %>
      <% if @debate_outcome.debate_pack_url? %>
      <p>Read the research: <%= auto_link(@debate_outcome.debate_pack_url) %></p>

      <% end %>
      <% if @debate_outcome.public_engagement_url? %>
      <p>Read what the public said: <%= auto_link(@debate_outcome.public_engagement_url) %></p>

      <% end %>
      <% if @debate_outcome.debate_summary_url? %>
      <p>Read a summary of the debate: <%= auto_link(@debate_outcome.debate_summary_url) %></p>

      <% end %>
      <p>The petition: <%= link_to nil, archived_petition_url(@petition) %></p>

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  notify_creator_of_threshold_response:
    subject: Government responded to “{{ petition.action }}”
    content: |
      {% render "reason" petition: petition, signature: signature %}

      Dear {{ signature.name }},

      The Government has responded to your petition – “[{{  petition.action }}]({{ petition.url }})”.

      {{ response.summary | blockquote }}
      >
      {{ response.details | blockquote }}

      Click this link to view the response online:

      <{{ response.url }}>

      {% if petition.signature_count >= 100000 %}
      This petition has over 100,000 signatures. The Petitions Committee will consider it for a debate. They can also gather further evidence and press the government for action.
      {% endif %}

      The Committee is made up of 11 MPs, from political parties in government and in opposition. It is entirely independent of the Government. Find out more about the Committee: {{ site.petitions_committee_url }}

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  notify_signer_of_debate_scheduled:
    subject: Parliament will debate “{{ petition.action }}”
    content: |
      {% render "reason", petition: petition, signature: signature %}

      Dear {{ signature.name }},

      Parliament is going to debate the petition you signed – “[{{ petition.action }}]({{ petition.url }})”.

      The debate is scheduled for {{ petition.scheduled_debate_date | date: "%d/%m/%Y" }}.

      Once the debate has happened, we’ll email you a video and transcript.

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  notify_signer_of_negative_debate_outcome:
    subject: Parliament didn’t debate “{{ petition.action }}”
    content: |
      {% render "reason", petition: petition, signature: signature %}

      Dear {{ signature.name }},

      <p>The Petitions Committee decided not to debate the petition you signed – “<%= @petition.action %>”</p>

      <% if @debate_outcome.overview? %>
      <blockquote><%= auto_link(simple_format(h(@debate_outcome.overview))) %></blockquote>

      <% end %>
      <p>The petition: <%= link_to nil, archived_petition_url(@petition) %></p>

      <p>Find out more about the Petitions Committee: <%= link_to nil, help_url(anchor: "petitions-committee") %></p>

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  notify_signer_of_positive_debate_outcome:
    subject: Parliament debated “{{ petition.action }}”
    content: |
      {% render "reason", petition: petition, signature: signature %}

      Dear {{ signature.name }},

      <p>Parliament debated the petition you signed – “<%= @petition.action %>”</p>

      <% if @debate_outcome.overview? %>
      <blockquote><%= auto_link(simple_format(h(@debate_outcome.overview))) %></blockquote>

      <% end %>
      <% if @debate_outcome.video_url? %>
