    content: |
      {% render "reason", petition: petition, signature: signature %}

      Dear {{ signature.name }},

      <p>The Petitions Committee decided not to debate the petition you signed – “<%= @petition.action %>”</p>

      <% if @debate_outcome.overview? %>
      <blockquote><%= auto_link(simple_format(h(@debate_outcome.overview))) %></blockquote>

      <% end %>
      <p>The petition: <%= link_to nil, petition_url(@petition) %></p>

      <p>Find out more about the Petitions Committee: <%= link_to nil, help_url(anchor: "petitions-committee") %></p>

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  notify_signer_of_positive_debate_outcome:
    subject: Parliament debated “{{ petition.action }}”
    content: |
      {% render "reason", petition: petition, signature: signature %}

      Dear {{ signature.name }},

      <p>Parliament debated the petition you signed – “<%= @petition.action %>”</p>

      <% if @debate_outcome.overview? %>
      <blockquote><%= auto_link(simple_format(h(@debate_outcome.overview))) %></blockquote>

      <% end %>
      <% if @debate_outcome.video_url? %>
      <p>Watch the debate: <%= auto_link(@debate_outcome.video_url) %></p>

      <% end %>
      <% if @debate_outcome.transcript_url? %>
      <p>Read the transcript: <%= auto_link(@debate_outcome.transcript_url) %></p>

      <% end %>
      <% if @debate_outcome.debate_pack_url? %>
      <p>Read the research: <%= auto_link(@debate_outcome.debate_pack_url) %></p>

      <% end %>
      <% if @debate_outcome.public_engagement_url? %>
      <p>Read what the public said: <%= auto_link(@debate_outcome.public_engagement_url) %></p>

      <% end %>
      <% if @debate_outcome.debate_summary_url? %>
      <p>Read a summary of the debate: <%= auto_link(@debate_outcome.debate_summary_url) %></p>

      <% end %>
      <p>The petition: <%= link_to nil, petition_url(@petition) %></p>

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  notify_signer_of_threshold_response:
    subject: Government responded to “{{ petition.action }}”
    content: |
      {% render "reason" petition: petition, signature: signature %}

      Dear {{ signature.name }},

      The Government has responded to the petition you signed – “[{{  petition.action }}]({{ petition.url }})”.

      {{ response.summary | blockquote }}
      >
      {{ response.details | blockquote }}

      Click this link to view the response online:

      <{{ response.url }}>

      {% if petition.signature_count >= 100000 %}
      This petition has over 100,000 signatures. The Petitions Committee will consider it for a debate. They can also gather further evidence and press the government for action.
      {% endif %}

      The Committee is made up of 11 MPs, from political parties in government and in opposition. It is entirely independent of the Government. Find out more about the Committee: {{ site.petitions_committee_url }}

      {% render "footer" %}

      {% render "unsubscribe" signature: signature %}
  notify_sponsor_that_petition_is_published:
    subject: We published the petition “{{ petition.action }}” that you supported
    content: |
      Dear {{ signature.name }},

      <p>We published the petition you supported – “<%= @petition.action %>”</p>

      <p>Click this link to see the petition and start sharing it:<br>
      <%= link_to nil, petition_url(@petition) %></p>

      {% render "footer" %}
  notify_sponsor_that_petition_was_hidden:
    subject: We rejected the petition “{{ petition.action }}” that you supported
    content: |
      Dear {{ signature.name }},

      <p>Sorry, we can’t accept the petition you supported – “<%= @petition.action %>”.

      <%= rejection_description(@rejection.code) %>
      <% if @rejection.details? -%>

      <p><%= auto_link(h(@rejection.details)) %></p>
      <% end -%>
      <% unless @petition.hidden? -%>

      <p>Click this link to see the rejected petition:<br>
      <%= link_to 'View the rejected petition', petition_url(@petition) %></p>
      <% end -%>

      <p>We only reject petitions that don’t meet the petition standards:<br>
      <%= link_to nil, help_url(anchor: 'standards') %></p>

      {% render "footer" %}
  notify_sponsor_that_petition_was_rejected:
    subject: We rejected the petition “{{ petition.action }}” that you supported
    content: |
      Dear {{ signature.name }},

      <p>Sorry, we can’t accept the petition you supported – “<%= @petition.action %>”.

      <%= rejection_description(@rejection.code) %>
      <% if @rejection.details? -%>

      <p><%= auto_link(h(@rejection.details)) %></p>
      <% end -%>
      <% unless @petition.hidden? -%>

      <p>Click this link to see the rejected petition:<br>
      <%= link_to 'View the rejected petition', petition_url(@petition) %></p>
      <% end -%>

      <p>We only reject petitions that don’t meet the petition standards:<br>
      <%= link_to nil, help_url(anchor: 'standards') %></p>

      {% render "footer" %}
sponsor_mailer:
  petition_and_email_confirmation_for_sponsor:
    subject: 'Sign to support: “{{ petition.action }}”'
    content: |
      Dear {{ sponsor.name }},

      Please [confirm your email]({{ sponsor.verification_url }}), to support and sign {{ petition.creator }}’s petition:

      > # {{ petition.action }}
      >
      > {{ petition.background }}

      {% render "footer" %}
  sponsor_signed_email_below_threshold:
    subject: 'Someone supported: “{{ petition.action }}”'
    content: |
      Dear {{ petition.creator }},

      Someone supported your petition:

      > # {{ petition.action }}
      >
      > {{ petition.background }}

      You have {{ petition.sponsor_count }} {{ petition.sponsor_count | pluralize: "supporter" }} so far.

      If {{ site.threshold_for_moderation | number_to_word }} people support your petition, we’ll check it to make sure it meets the [petition standards]({{ site.standards_url }}).

      If it does, we’ll publish it. If it doesn’t, we’ll let you know why.

      {% render "footer" %}
  sponsor_signed_email_on_threshold:
    subject: 'Your petition has {{ site.threshold_for_moderation | number_to_word }} supporters: “{{ petition.action }}”'
    content: |
      Dear {{ petition.creator }},

      Someone supported your petition:

      > # {{ petition.action }}
      >
      > {{ petition.background }}

      {% if site.moderation_delay %}
      {{ petition.sponsor_count }} {% petition.sponsor_count > 1%}people have{% else %}person has{% endif %} supported your petition. We’re checking it to make sure it meets the [petition standards]({{ site.standards_url }}). If it does, we’ll publish it. If it doesn’t, we’ll let you know why.

      We currently have a very large number of petitions to check, so it may take a number of weeks to check your petition. Thank you for your patience.
      {% else %}
      {{ petition.sponsor_count }} {% petition.sponsor_count > 1%}people have{% else %}person has{% endif %} supported your petition.

      We’re checking it to make sure it meets the [petition standards]({{ site.standards_url }}).

      If it does, we’ll publish it. If it doesn’t, we’ll let you know why.

      This can take up to 10 working days. During holiday periods, this may take longer. Thank you for your patience.
      {% endif %}

      Once your petition has {{ site.maximum_number_of_sponsors }} supporters, no one else will be able to sign it until it’s been checked. Please wait until it’s been checked and published before sharing more widely.

      {% render "footer" %}
