      awaiting_response:
        html:
          "<span class=\"count\">%{formatted_count}</span> Government response queue"
      awaiting_debate:
        html:
          "<span class=\"count\">%{formatted_count}</span> Debate queue"
      all:
        html:
          "<span class=\"count\">%{formatted_count}</span> All petitions"

