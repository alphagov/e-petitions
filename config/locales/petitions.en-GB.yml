          one: "<span class=\"count\">%{formatted_count}</span> <span class=\"suffix\">petition from the current Parliament has received a response from the Government</span>"
          other: "<span class=\"count\">%{formatted_count}</span> <span class=\"suffix\">petitions from the current Parliament have received a response from the Government</span>"
